name: phpx-tests
on: [ push, pull_request ]

jobs:
  php:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: [ 8.2, 8.3, 8.4, 8.5 ]
    steps:
      - uses: actions/checkout@v1
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "${{ matrix.php }}"
          extensions: embed, curl, redis, json, ffi
          ini-values: ffi.enable=1
      - name: Install dependencies
        run: sudo apt update -y && sudo apt install -y googletest libgtest-dev libsodium-dev libkrb5-dev libargon2-dev redis-server libgmp-dev libmpfr-dev
      - name: Show machine information
        run: |
          date
          env
          uname -a
          php -v
          php --ini
      - name: Build
        run: |
          cmake . -D CODE_COVERAGE=ON -D GITHUB_ACTION=ON || exit 1
          make VERBOSE=1 -j$(nproc)
      - name: Run google tests
        run: |
          # sudo sh -c 'echo 0 > /proc/sys/kernel/randomize_va_space'
          ./bin/phpx-tests
      - name: Run phpunit tests
        run: |
          composer install
          sudo cp lib/ext.so $(php-config --extension-dir)/phpx_test.so
          sudo sh -c 'echo "extension=phpx_test.so" > $(php-config --ini-dir)/phpx_test.ini'
          composer test
      - name: Run coverage
        shell: bash
        run: |
          sudo apt-get install lcov
          sudo lcov --directory . --capture --branch-coverage --rc geninfo_unexecuted_blocks=1 --ignore-errors mismatch --output-file coverage.info
          sudo lcov --remove coverage.info '/usr/*' --output-file coverage.info
          sudo lcov --list coverage.info
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.info
          fail_ci_if_error: true

  macos-clang:
    name: macOS / Clang / PHP 8.4
    runs-on: macos-latest
    env:
      CC: clang
      CXX: clang++
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: curl, redis, ffi
          ini-values: ffi.enable=1
        env:
          fail-fast: true
      - name: Install build dependencies
        run: brew install googletest gmp mpfr redis
      - name: Build PHP Embed library
        run: |
          PHP_VERSION="$(php -r 'echo PHP_VERSION;')"
          PHP_SOURCE="$RUNNER_TEMP/php-$PHP_VERSION"
          curl -fsSL "https://www.php.net/distributions/php-$PHP_VERSION.tar.xz" \
            | tar -xJ -C "$RUNNER_TEMP"
          cd "$PHP_SOURCE"
          eval "./configure $(php-config --configure-options) --enable-embed=shared"
          make --jobs "$(sysctl -n hw.logicalcpu)" sapi/embed/libphp.la
          test -f "$PHP_SOURCE/sapi/embed/.libs/libphp.dylib"
          echo "PHP_EMBED_LIB_DIR=$PHP_SOURCE/sapi/embed/.libs" >> "$GITHUB_ENV"
      - name: Show toolchain information
        run: |
          sw_vers
          clang --version
          clang++ --version
          php -v
          php --ini
          php-config --prefix
          php-config --includes
          test -f "$PHP_EMBED_LIB_DIR/libphp.dylib"
      - name: Start Redis
        run: |
          brew services start redis
          for attempt in {1..10}; do
            redis-cli ping | grep -q PONG && exit 0
            sleep 1
          done
          exit 1
      - name: Build with Clang
        run: |
          export CPPFLAGS="-I$(brew --prefix gmp)/include -I$(brew --prefix mpfr)/include"
          export LDFLAGS="-L$(brew --prefix gmp)/lib -L$(brew --prefix mpfr)/lib"
          cmake -S . -B build-clang \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER="$CC" \
            -DCMAKE_CXX_COMPILER="$CXX" \
            -DCMAKE_EXE_LINKER_FLAGS="-L$PHP_EMBED_LIB_DIR" \
            -DBUILD_TESTS=ON \
            -DBUILD_EXT=ON \
            -DGITHUB_ACTION=ON
          cmake --build build-clang --target phpx-tests ext --parallel "$(sysctl -n hw.logicalcpu)"
          test -f lib/libphpx.dylib
          test -f lib/ext.dylib
      - name: Run Google Tests
        run: DYLD_LIBRARY_PATH="$PHP_EMBED_LIB_DIR" ./build-clang/bin/phpx-tests
      - name: Run phpx-test extension tests
        run: |
          composer install --no-interaction --prefer-dist
          php -d "extension=$PWD/lib/ext.dylib" \
            vendor/bin/phpunit \
            --bootstrap tests/bootstrap.php \
            -c phpunit.xml \
            --colors=always
